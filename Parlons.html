<title>Parlons — Learn French</title>
<style>
  :root{
    --bg0:#0a0e1a; --bg1:#121a33; --bg2:#1a1140;
    --glass: rgba(255,255,255,0.10); --glass-strong: rgba(255,255,255,0.16);
    --stroke: rgba(255,255,255,0.22); --stroke-soft: rgba(255,255,255,0.12);
    --txt:#f5f7ff; --txt-dim:rgba(245,247,255,0.62); --txt-faint:rgba(245,247,255,0.40);
    --accent:#5b8cff; --accent2:#7c5cff; --good:#34e0a1; --bad:#ff5d7a; --gold:#ffd66b;
    --r:26px; --r-sm:16px; --shadow:0 10px 40px rgba(0,0,0,0.35);
    --safe-top: env(safe-area-inset-top, 0px); --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
    color:var(--txt);background:var(--bg0);overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;}
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:
      radial-gradient(120% 120% at 80% 0%, var(--bg2) 0%, transparent 55%),
      radial-gradient(120% 120% at 0% 100%, var(--bg1) 0%, transparent 60%),var(--bg0);}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.55;mix-blend-mode:screen;animation:float 18s ease-in-out infinite;}
  .b1{width:46vmax;height:46vmax;left:-10vmax;top:-12vmax;background:#3b6bff;}
  .b2{width:40vmax;height:40vmax;right:-12vmax;top:8vmax;background:#a64bff;animation-delay:-6s;}
  .b3{width:42vmax;height:42vmax;left:18vmax;bottom:-18vmax;background:#00c2a8;animation-delay:-11s;}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(6vmax,4vmax) scale(1.08);}66%{transform:translate(-5vmax,3vmax) scale(0.95);}}

  #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:calc(20px + var(--safe-top)) 18px 130px;scroll-behavior:smooth;}
  .scroll::-webkit-scrollbar{width:0;}
  .glass{background:var(--glass);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--stroke-soft);border-radius:var(--r);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.18);}
  .card{padding:20px;margin-bottom:16px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .hi{font-size:14px;color:var(--txt-dim);font-weight:600;}
  .title{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin:2px 0 0;}
  .streak{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:30px;font-weight:800;font-size:16px;}
  .streak .fire{font-size:18px;}
  .levelbar{display:flex;gap:6px;padding:6px;border-radius:30px;margin-bottom:16px;}
  .lvbtn{flex:1;text-align:center;padding:9px 0;border-radius:24px;font-weight:800;font-size:14px;cursor:pointer;color:var(--txt-dim);transition:all .2s;}
  .lvbtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 18px rgba(91,140,255,0.4);}
  .ringwrap{display:flex;align-items:center;gap:18px;}
  .ring{position:relative;width:104px;height:104px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .pct b{font-size:24px;font-weight:800;} .ring .pct span{font-size:10px;color:var(--txt-dim);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
  .goalinfo h3{margin:0 0 4px;font-size:18px;font-weight:800;} .goalinfo p{margin:0;font-size:13px;color:var(--txt-dim);line-height:1.5;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat{padding:14px 10px;text-align:center;border-radius:var(--r-sm);}
  .stat b{display:block;font-size:22px;font-weight:800;} .stat span{font-size:11px;color:var(--txt-dim);font-weight:700;letter-spacing:0.03em;}
  .sec-label{font-size:13px;font-weight:800;color:var(--txt-faint);text-transform:uppercase;letter-spacing:0.08em;margin:6px 4px 12px;}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .mode{padding:20px 16px;border-radius:var(--r);cursor:pointer;position:relative;overflow:hidden;transition:transform .18s cubic-bezier(.2,.9,.3,1.4);}
  .mode:active{transform:scale(0.96);}
  .mode .emoji{font-size:30px;display:block;margin-bottom:12px;}
  .mode h4{margin:0 0 4px;font-size:17px;font-weight:800;} .mode p{margin:0;font-size:12px;color:var(--txt-dim);}
  .mode .badge{position:absolute;top:14px;right:14px;font-size:10px;font-weight:800;padding:4px 8px;border-radius:20px;background:rgba(255,93,122,0.22);color:#ffb3c2;border:1px solid rgba(255,93,122,0.4);}
  .flaw{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--stroke-soft);}
  .flaw:last-child{border-bottom:none;}
  .flaw .ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;background:var(--glass-strong);}
  .flaw .body{flex:1;min-width:0;} .flaw .body .n{font-weight:700;font-size:15px;}
  .bar{height:8px;border-radius:8px;background:rgba(255,255,255,0.12);overflow:hidden;margin-top:6px;}
  .bar i{display:block;height:100%;border-radius:8px;transition:width .8s cubic-bezier(.2,.8,.2,1);}
  .flaw .v{font-size:13px;font-weight:800;width:42px;text-align:right;}
  .fixrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--stroke-soft);cursor:pointer;}
  .fixrow:last-child{border-bottom:none;}
  .fixrow .ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;background:var(--glass-strong);}
  .fixrow .lab{flex:1;min-width:0;}

/* ============================ SRS ENGINE ============================ */
function ensureMem(id){const it=REGMAP[id];if(!S.mem[id])S.mem[id]={reps:0,correct:0,streak:0,ease:2.5,interval:0,due:0,lapses:0,stage:"new",skill:it.skill,lvl:it.lvl,bucket:it.bucket,label:it.label};return S.mem[id];}
function ratio(m){return m.reps?m.correct/m.reps:0;}
function itemScore(m){return (m.lapses*3)+((1-ratio(m))*2)+(m.stage==="learning"?1.5:0);}
function schedule(m,correct){
  if(correct){
    m.streak++;
    if(m.stage==="new"||m.stage==="learning"){
      if(m.streak>=2){m.stage="review";m.interval=1;m.ease=Math.max(m.ease,2.3);}
      else{m.stage="learning";m.interval=0;}
    }else{m.interval=Math.max(1,Math.round(m.interval*m.ease));m.ease=Math.min(2.7,m.ease+0.1);if(m.interval>=21)m.stage="mastered";}
  }else{
    if(m.stage==="review"||m.stage==="mastered")m.lapses++;
    m.streak=0;m.stage="learning";m.ease=Math.max(1.3,m.ease-0.2);m.interval=0;
  }
  m.due=Date.now()+m.interval*DAY; // learning items (interval 0) become due immediately → resurface next session
}
// record an answer: SRS + skill stats + xp + error patterns + confusions
function grade(q,correct,chosen,bonus){
  rollDay();
  const m=ensureMem(q.itemId);m.reps++;if(correct)m.correct++;schedule(m,correct);
  S.skill[q.skill][correct?"c":"w"]++;
  if(!S.patterns[q.bucket])S.patterns[q.bucket]={c:0,w:0};
  S.patterns[q.bucket][correct?"c":"w"]++;
  if(!correct && chosen){const key=q.bucket+" ◦ chose “"+chosen+"” for “"+q.a+"”";S.conf[key]=(S.conf[key]||0)+1;}
  if(correct){S.xp+=8+(bonus||0);S.todayXP+=8+(bonus||0);markActive();}
  save();
}

/* eligible registry / pools. scope 'current' = exactly the chosen level; otherwise cumulative (<= level) */
function eligible(scope){return scope==="current"?REG.filter(it=>it.lvl===S.cefr):REG.filter(it=>LV[it.lvl]<=LV[S.cefr]);}
function dueItems(focus){const now=Date.now();return eligible().filter(it=>S.mem[it.id]&&S.mem[it.id].due<=now&&(!focus||focus.includes(it.skill))).sort((a,b)=>S.mem[a.id].due-S.mem[b.id].due);}
function weakItems(focus){return eligible().filter(it=>{const m=S.mem[it.id];return m&&(!focus||focus.includes(it.skill))&&(m.lapses>0||m.stage==="learning"||(m.reps>=2&&ratio(m)<0.65));}).sort((a,b)=>itemScore(S.mem[b.id])-itemScore(S.mem[a.id]));}
function reviewCount(){return new Set([...dueItems(),...weakItems()].map(x=>x.id)).size;}

function makeQForItem(id){
  const it=REGMAP[id];if(!it)return null;const m=S.mem[id];const strong=m&&(m.stage==="review"||m.stage==="mastered");
  const base={itemId:id,skill:it.skill,lvl:it.lvl,bucket:it.bucket};
  if(id[0]==="v"&&id[1]===":"){
    const w=VOCAB.find(x=>x.de===id.slice(2));if(!w)return null;
    if(strong&&LV[S.cefr]>=2){return Object.assign(base,{type:"type",promptSmall:"Type the French",prompt:w.en,sub:w.g?"(include the article)":"",a:w.de,accept:[norm(w.de),norm(w.de.replace(/^(der|die|das)\s+/,""))],ex:w.en+" = "+w.de});}
    const dir=Math.random()<0.5;const wrongs=shuffle(VOCAB.filter(v=>v.de!==w.de)).slice(0,3);
    return Object.assign(base,{type:"mc",promptSmall:dir?"What does this mean?":"How do you say?",prompt:dir?w.de:w.en,speak:dir?w.de:null,a:dir?w.en:w.de,opts:shuffle([w,...wrongs]).map(o=>dir?o.en:o.de)});
  }
  if(id[0]==="p"&&id[1]===":"){
    const p=PHRASES.find(x=>x.de===id.slice(2));if(!p)return null;
    const words=p.de.split(" ");
    // tap-to-build word order task (interactive) once it has enough words and you've seen it once
    if(words.length>=3 && (strong||Math.random()<0.5)){
      return Object.assign(base,{type:"build",promptSmall:"Build the sentence",prompt:p.en,words:shuffle(words),answer:p.de,speak:p.de,ex:p.de});
    }
    const wrongs=shuffle(PHRASES.filter(x=>x.de!==p.de)).slice(0,3);
    return Object.assign(base,{type:"mc",promptSmall:"Listen & choose the meaning",prompt:p.de,sub:"Tap 🔊 to hear it",speak:p.de,autospeak:true,a:p.en,opts:shuffle([p,...wrongs]).map(o=>o.en)});
  }
  if(id[0]==="g"&&id[1]===":"){
    const g=GRAMMAR[+id.slice(2)];if(!g)return null;
    if(g.type==="type")return Object.assign(base,{type:"type",promptSmall:"Grammar",prompt:g.q,sub:g.hint?"Hint: "+g.hint:"",a:g.a,accept:g.accept||[norm(g.a)],ex:g.ex});
    return Object.assign(base,{type:"mc",promptSmall:"Grammar",prompt:g.q,a:g.a,opts:shuffle(g.opts),ex:g.ex});
  }
  // verb item  vb:inf:tense
  const parts=id.split(":");const v=VERBS.find(x=>x.inf===parts[1]);const tense=parts[2];if(!v)return null;
  const typing=strong&&LV[S.cefr]>=4;
  if(tense==="present"){const pi=Math.floor(Math.random()*6);const a=v.pres[pi];const ws=new Set();while(ws.size<3){const o=pick(VERBS).pres[Math.floor(Math.random()*6)];if(o!==a)ws.add(o);}return Object.assign(base,{type:"mc",promptSmall:`Present · “${v.inf}” (${v.en})`,prompt:`${PRONOUNS[pi]} ___`,a,opts:shuffle([a,...ws]),ex:`${PRONOUNS[pi]} ${a}`});}
  if(tense==="perfekt"){const pi=Math.floor(Math.random()*6);const a=AUX[v.aux][pi]+" "+v.part;if(typing)return Object.assign(base,{type:"type",promptSmall:`Passé composé · “${v.inf}” (${v.en})`,prompt:`${PRONOUNS[pi]} ___ (today)`,a,accept:[norm(a)],ex:`Passé composé: ${PRONOUNS[pi]} ${a}`});const ws=new Set();while(ws.size<3){const o=AUX[v.aux][pi]+" "+pick(VERBS).part;if(o!==a)ws.add(o);}return Object.assign(base,{type:"mc",promptSmall:`Passé composé · “${v.inf}” (${v.en})`,prompt:`${PRONOUNS[pi]} ___ (today)`,a,opts:shuffle([a,...ws]),ex:`Passé composé: ${PRONOUNS[pi]} ${a}  · aux=${v.aux}`});}
  if(tense==="praet"){const a=v.prat;if(typing)return Object.assign(base,{type:"type",promptSmall:`Imperfect · “${v.inf}” (${v.en})`,prompt:`il ___`,a,accept:[norm(a)],ex:`Imperfect: il ${a}`});const ws=new Set();while(ws.size<3){const o=pick(VERBS).prat;if(o!==a)ws.add(o);}return Object.assign(base,{type:"mc",promptSmall:`Imperfect · “${v.inf}” (${v.en})`,prompt:`il ___`,a,opts:shuffle([a,...ws]),ex:`Imperfect: il ${a}`});}
  const a=v.k2;const ws=new Set();while(ws.size<3){const o=pick(VERBS).k2;if(o!==a)ws.add(o);}return Object.assign(base,{type:"mc",promptSmall:`Conditional · “${v.inf}” (${v.en})`,prompt:`il ___`,a,opts:shuffle([a,...ws]),ex:`Conditional: il ${a}`});
}

/* ============================ ADAPTIVE SELECTOR ============================ */
function pickQueue(opts){
  opts=opts||{};const n=opts.n||12;const focus=opts.focus||null;
  // REVIEW mode: pull weak/overdue items across ALL levels you've studied (this is the only place lower levels resurface)
  if(opts.mode==="review"){const ids=[...new Set([...weakItems(focus),...dueItems(focus)].map(x=>x.id))];return shuffle(ids).slice(0,Math.max(n,ids.length>14?14:ids.length));}
  // NORMAL drills + daily mix: stay strictly at the CHOSEN level, so picking C1 means C1 (never demotes to A1)
  const elig=eligible("current").filter(it=>!focus||focus.includes(it.skill));const now=Date.now();
  const dueCur=elig.filter(it=>S.mem[it.id]&&S.mem[it.id].due<=now).sort((a,b)=>S.mem[a.id].due-S.mem[b.id].due);
  let queue=dueCur.slice(0,n).map(x=>x.id);                                // 1) items due for review at this level
  const newCap=Math.max(2,Math.round(n*0.6));
  for(const it of shuffle(elig.filter(it=>!S.mem[it.id]))){if(queue.length>=n)break;if(queue.filter(id=>!S.mem[id]).length>=newCap)break;if(!queue.includes(it.id))queue.push(it.id);} // 2) new items (capped)
  const weakCur=elig.filter(it=>{const m=S.mem[it.id];return m&&(m.lapses>0||m.stage==="learning"||(m.reps>=2&&ratio(m)<0.65));}).sort((a,b)=>itemScore(S.mem[b.id])-itemScore(S.mem[a.id]));
  for(const it of weakCur){if(queue.length>=n)break;if(!queue.includes(it.id))queue.push(it.id);} // 3) weak fillers at this level
  if(queue.length<n)for(const it of shuffle(elig)){if(queue.length>=n)break;if(!queue.includes(it.id))queue.push(it.id);} // 4) any item at this level
  return shuffle(queue);
}

function renderTabs(){$("#tabs").innerHTML=TABS.map(t=>`<div class="tab ${view===t.id?'on':''}" data-tab="${t.id}"><svg viewBox="0 0 24 24">${t.icon}</svg>${t.label}</div>`).join("");document.querySelectorAll("[data-tab]").forEach(el=>el.onclick=()=>{view=el.dataset.tab;render();});}
function ringSVG(pct,size=104){const r=46,c=2*Math.PI*r,off=c*(1-Math.min(pct,100)/100);return `<svg width="${size}" height="${size}" viewBox="0 0 104 104"><circle cx="52" cy="52" r="${r}" stroke="rgba(255,255,255,0.12)" stroke-width="9" fill="none"/><circle cx="52" cy="52" r="${r}" stroke="url(#gg)" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/><defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34e0a1"/><stop offset="1" stop-color="#5b8cff"/></linearGradient></defs></svg>`;}
function levelBar(){return `<div class="glass levelbar">${LEVELS.map(l=>`<div class="lvbtn ${S.cefr===l?'on':''}" onclick="setLevel('${l}')">${l}</div>`).join("")}</div>`;}
window.setLevel=l=>{S.cefr=l;save();render();toast("Level set to "+l);};

function mascotLine(){const gp=S.todayXP/S.goal;if(gp>=1)return pick(["Bravo ! 🎉","Bien joué !","Excellent !","Super !"]);if(S.streak>=3)return pick(["Belle série ! 🔥","Continue comme ça !","Tu es fort !"]);if(!S.streak)return pick(["On apprend ?","Allez ! 💪","Prêt ?"]);return pick(["Content de te voir !","C'est l'heure d'étudier !","Encore un peu !"]);}
window.mascotTap=()=>{const m=$("#mascot");if(m){m.classList.remove("jump");void m.offsetWidth;m.classList.add("jump");}sfx("tap");haptic(20);const w=pick(VOCAB);const b=$("#bubble");if(b)b.innerHTML="<b>"+w.de+"</b> · "+w.en;speak(w.de);};

/* ============================ VIEWS ============================ */
function viewToday(){
  rollDay();const goalPct=Math.round(100*S.todayXP/S.goal);const rc=reviewCount();
  const fixes=weakItems().slice(0,4);
  const hour=new Date().getHours();const greet=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  return `<div class="fade">
    <div class="top"><div><div class="hi">${greet}, ${S.name} 👋</div><div class="title">Parlons</div></div><div class="glass streak"><span class="fire">🔥</span>${S.streak}</div></div>
    ${levelBar()}
    ${(()=>{const rk=rankFor(level());return `<div class="glass card hero-card pop">
      <div class="mascot" id="mascot" onclick="mascotTap()">${pixelMascot(7,rk.color)}</div>
      <div class="hero-info">
        <div class="bubble" id="bubble">${mascotLine()}</div>
        <div class="rank">${rk.emoji} ${rk.title} · Level ${level()}</div>
        <div class="bar" style="height:10px;"><i style="width:${levelProg()}%;background:linear-gradient(90deg,var(--accent),var(--accent2));"></i></div>
        <div class="rankmeta">${levelProg()}/100 XP to next level · tap me!</div>
      </div></div>`;})()}
    <div class="glass card pop"><div class="ringwrap"><div class="ring">${ringSVG(goalPct)}<div class="pct"><b>${Math.min(goalPct,100)}%</b><span>Daily goal</span></div></div>
      <div class="goalinfo"><h3>${S.todayXP} / ${S.goal} XP today</h3><p>${goalPct>=100?"Goal smashed! 🎉":`Adaptive practice at <b style="color:var(--txt)">${S.cefr}</b> — it targets your weak spots.`}</p></div></div></div>
    <div class="stats"><div class="glass stat"><b>${S.xp}</b><span>TOTAL XP</span></div><div class="glass stat"><b>Lv ${level()}</b><span>LEVEL</span></div><div class="glass stat"><b>${S.cefr}</b><span>CEFR</span></div></div>

/* ============================ SESSIONS ============================ */
let sess=null;
function startSession(opts){const q=pickQueue(opts);if(!q.length){toast("Nothing to practice here yet — try the daily mix.");return;}sess={queue:q,answered:0,correct:0,combo:0,maxCombo:0,relearn:new Set(),mode:opts.mode||"normal",log:[]};runSession();}
function startSkill(skill){startSession({focus:[skill],n:10});}window.startSkill=startSkill;
function startDaily(){startSession({focus:null,n:12});}window.startDaily=startDaily;
function startReview(){const rc=reviewCount();if(!rc)return toast("No mistakes to review yet — nice!");startSession({mode:"review",n:15});}window.startReview=startReview;
function drillItem(id){const it=REGMAP[id];if(!it)return;const extra=weakItems([it.skill]).map(x=>x.id).filter(x=>x!==id).slice(0,5);sess={queue:[id,...extra],answered:0,correct:0,combo:0,maxCombo:0,relearn:new Set(),mode:"review",log:[]};runSession();}window.drillItem=drillItem;

function runSession(){
  if(!sess)return;
  if(!sess.queue.length)return showResult();
  const id=sess.queue[0];const q=makeQForItem(id);
  if(!q){sess.queue.shift();return runSession();}
  sess.cur=q;sess.locked=false;sess.qStart=Date.now();
  const prog=Math.round(100*sess.answered/(sess.answered+sess.queue.length));
  let optsHtml;
  if(q.type==="type"){optsHtml=`<div class="typewrap"><input class="typein" id="tin" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Type your answer…"/><button class="btn" id="tsub" onclick="answerType()">Check</button></div>`;}
  else if(q.type==="build"){sess.build={bank:q.words.slice(),picked:[]};optsHtml=`<div class="buildans" id="bans"></div><div class="buildbank" id="bbank"></div><button class="btn" id="bsub" onclick="answerBuild()">Check</button>`;}
  else{optsHtml=`<div class="opts" id="opts">${q.opts.map((o,idx)=>`<div class="opt" data-i="${idx}" onclick="answer(this,${idx})">${o}</div>`).join("")}</div>`;}
  const combo=sess.combo>=2?`<div style="text-align:center;font-weight:800;color:var(--gold);font-size:13px;margin-bottom:6px;">🔥 ${sess.combo} streak · x${comboMult(sess.combo+1)} next</div>`:"";
  screen.innerHTML=`<div class="center"><div class="fade">
    <div class="q-head"><div class="glass q-back" onclick="quitSession()">←</div><div class="q-prog"><i style="width:${prog}%"></i></div><div class="q-x">${sess.mode==="review"?"⟳":""} ${sess.answered+1}</div></div>
    ${combo}
    <div class="glass prompt pop"><span class="lvtag ${sess.mode==='review'?'rev':''}">${sess.mode==="review"?"REVIEW · ":""}${q.lvl}</span><div class="small">${q.promptSmall}</div><div class="word">${q.prompt}</div>${q.sub?`<div class="sub">${q.sub}</div>`:''}${q.speak?`<div class="glass speak" onclick="speak('${esc(q.speak)}')">🔊 Listen</div>`:''}</div>
    <div class="feedback" id="fb"></div>${optsHtml}</div></div>`;
  renderTabs();
  const tb=$("#tb");if(tb){tb.style.transitionDuration=QTIME+"ms";requestAnimationFrame(()=>{tb.style.width="0%";});}
  if(q.type==="build")renderBuild();
  if(q.type==="type"){const inp=$("#tin");setTimeout(()=>inp&&inp.focus(),60);if(inp)inp.addEventListener("keydown",e=>{if(e.key==="Enter")answerType();});}
  if(q.autospeak)setTimeout(()=>speak(q.speak),350);
}
window.runSession=runSession;
window.quitSession=()=>{sess=null;view="today";render();};

function advance(q,correct){
  sess.answered++;if(correct)sess.correct++;sess.log.push({label:REGMAP[q.itemId].label,correct});
  sess.queue.shift();
  if(!correct&&!sess.relearn.has(q.itemId)){sess.relearn.add(q.itemId);const pos=Math.min(3,sess.queue.length);sess.queue.splice(pos,0,q.itemId);}
  setTimeout(()=>runSession(),correct?850:1900);
}
// shared scoring: combo multiplier, speed bonus, sound, haptics, shake
function onGraded(q,correct,chosen){
  const dt=Date.now()-(sess.qStart||Date.now());let bonus=0;
  if(correct){sess.combo++;sess.maxCombo=Math.max(sess.maxCombo,sess.combo);const mult=comboMult(sess.combo);const speed=dt<3500?4:dt<7000?2:0;bonus=(mult-1)*8+speed;sfx("ok");haptic(30);if(sess.combo>=3||speed)showCombo((sess.combo>=3?"🔥 x"+mult+" combo":"⚡ fast")+"  +"+(8+bonus)+" XP");}
  else{sess.combo=0;sfx("no");haptic([40,30,40]);const pr=document.querySelector(".prompt");if(pr){pr.classList.remove("shake");void pr.offsetWidth;pr.classList.add("shake");}}
  grade(q,correct,chosen,bonus);advance(q,correct);
}
function fbCorrect(){const fb=$("#fb");fb.textContent="Correct!";fb.className="feedback g";}
function fbWrong(ansHTML,ex){const fb=$("#fb");fb.className="feedback b";fb.innerHTML=`Answer: <b>${ansHTML}</b>`+(ex?`<div style="font-size:14px;font-weight:700;color:var(--txt-dim);margin-top:4px;">${ex}</div>`:"");}
function frListen(t){if(!t)return;const fb=$("#fb");if(fb)fb.innerHTML+=`<div class="glass speak" style="margin-top:10px;display:inline-flex;" onclick="speak('${esc(t)}')">🔊 ${t}</div>`;speak(t);}
window.answer=(el,idx)=>{const q=sess.cur;if(el.parentElement.dataset.locked)return;el.parentElement.dataset.locked="1";const chosen=q.opts[idx];const correct=chosen===q.a;
  document.querySelectorAll("#opts .opt").forEach(o=>{const t=q.opts[o.dataset.i];if(t===q.a)o.classList.add("correct");else if(+o.dataset.i===idx)o.classList.add("wrong");else o.classList.add("dim");});
  if(correct){fbCorrect();}else fbWrong(q.a,q.ex);frListen(q.speak||q.a);
  onGraded(q,correct,chosen);};
window.answerType=()=>{const q=sess.cur;const inp=$("#tin");if(!inp||inp.disabled)return;const val=norm(inp.value);if(!val)return;const correct=q.accept.includes(val);
  inp.disabled=true;inp.classList.add(correct?"correct":"wrong");const sub=$("#tsub");if(sub)sub.style.display="none";
  if(correct){fbCorrect();}else fbWrong(q.a,q.ex);frListen(q.speak||q.a);
  onGraded(q,correct,inp.value.trim());};
/* tap-to-build sentence */
function renderBuild(){const ans=$("#bans"),bank=$("#bbank");if(!ans||!bank)return;
  ans.innerHTML=sess.build.picked.length?sess.build.picked.map((w,i)=>`<div class="chip" onclick="buildUnpick(${i})">${w}</div>`).join(""):'<span style="color:var(--txt-faint);align-self:center;">tap the words in order…</span>';
  bank.innerHTML=sess.build.bank.map((w,i)=>w==null?"":`<div class="chip" onclick="buildPick(${i})">${w}</div>`).join("");}
window.buildPick=i=>{if(sess.locked)return;const w=sess.build.bank[i];if(w==null)return;sess.build.bank[i]=null;sess.build.picked.push(w);sfx("tap");speak(w);renderBuild();};
window.buildUnpick=i=>{if(sess.locked)return;const w=sess.build.picked.splice(i,1)[0];const slot=sess.build.bank.indexOf(null);if(slot>=0)sess.build.bank[slot]=w;else sess.build.bank.push(w);sfx("tap");speak(w);renderBuild();};
window.answerBuild=()=>{const q=sess.cur;if(sess.locked||!sess.build.picked.length)return;sess.locked=true;
  const assembled=sess.build.picked.join(" ");const correct=norm(assembled)===norm(q.answer);
  document.querySelectorAll("#bbank .chip,#bans .chip").forEach(c=>c.style.pointerEvents="none");const sub=$("#bsub");if(sub)sub.style.display="none";
  if(correct){fbCorrect();}else fbWrong(q.answer);frListen(q.answer);
  onGraded(q,correct,assembled);};

function showResult(){
  const total=sess.answered||1;const pct=Math.round(100*sess.correct/total);
  if((sess.maxCombo||0)>(S.bestCombo||0)){S.bestCombo=sess.maxCombo;save();}
  let lessonMsg="",lessonBtns="";
  if(sess.mode==="lesson"){const L=LESSONS[sess.lessonIdx];const rec=lsRec(L);const pass=pct>=60;if(pass)rec.done=true;rec.best=Math.max(rec.best,pct);rec.stars=Math.max(rec.stars,pct>=100?3:pct>=80?2:pass?1:0);S.lessons[L.id]=rec;save();
    const ni=sess.lessonIdx+1;
    if(pass){lessonMsg=`<div style="font-weight:800;color:var(--gold);font-size:22px;margin:4px 0;">${"★".repeat(rec.stars)}${"☆".repeat(3-rec.stars)}</div><p style="margin:0 0 14px;color:var(--good);font-weight:800;">Lesson complete!</p>`;
      lessonBtns=(ni<LESSONS.length&&lsUnlocked(ni))?`<button class="btn" onclick="startLesson(${ni})">Next lesson →</button><button class="btn ghost" style="margin-top:12px;" onclick="view='map';sess=null;render();">Back to map</button>`:`<button class="btn" onclick="view='map';sess=null;render();">Back to map 🎉</button>`;
    } else {lessonMsg=`<p style="margin:0 0 14px;color:var(--bad);font-weight:800;">Score 60%+ to pass — try again!</p>`;lessonBtns=`<button class="btn" onclick="startLesson(${sess.lessonIdx})">Retry lesson</button><button class="btn ghost" style="margin-top:12px;" onclick="view='map';sess=null;render();">Back to map</button>`;}
  }
  if(pct>=70){confetti();sfx("win");}else sfx(pct>=50?"ok":"no");
  const em=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"📚";
  const msg=pct>=90?"Excellent!":pct>=70?"Very good!":pct>=50?"Well done.":"Practice makes perfect.";
  const misses=sess.log.filter(l=>!l.correct);const uniqMiss=[...new Set(misses.map(m=>m.label))];
  const defaultBtns=`<button class="btn" onclick="view='today';sess=null;render();">Continue</button>${reviewCount()>0?`<button class="btn warn" style="margin-top:12px;" onclick="startReview()">Review weak items</button>`:`<button class="btn ghost" style="margin-top:12px;" onclick="startDaily()">Another round</button>`}`;
  screen.innerHTML=`<div class="center"><div class="glass result pop"><div class="em">${em}</div><div class="score">${sess.correct}/${total}</div><h2>${pct}% · ${msg}</h2>${lessonMsg}
    <p>+${sess.correct*8} XP base (+combo bonus) · 🔥 best combo x${sess.maxCombo||0} · ${S.cefr}</p>
    ${uniqMiss.length?`<div class="reslist"><div class="sec-label" style="margin:6px 4px 8px;">Saved for spaced review</div>${uniqMiss.slice(0,6).map(l=>`<div style="padding:8px 0;border-bottom:1px solid var(--stroke-soft);font-size:14px;color:var(--txt-dim);">↻ ${l}</div>`).join("")}</div>`:`<p style="color:var(--good);font-weight:700;margin:14px 0 20px;">Clean run! 🎯</p>`}
    ${sess.mode==="lesson"?lessonBtns:defaultBtns}</div></div>`;
  renderTabs();
}

/* ============================ WORD MATCH MINI-GAME ============================ */
let match=null;
function startMatch(){
  let pool=VOCAB.filter(v=>v.lvl===S.cefr);if(pool.length<5)pool=VOCAB.filter(v=>LV[v.lvl]<=LV[S.cefr]);
  if(pool.length<4)return toast("Not enough vocabulary at this level.");
  const pairs=shuffle(pool).slice(0,Math.min(6,pool.length));
  match={pairs,left:shuffle(pairs.map(p=>p.de)),right:shuffle(pairs.map(p=>p.en)),sel:null,bad:null,hit:null,matched:new Set(),tries:0,hits:0,combo:0,start:Date.now()};
  sess=null;renderMatch();
}
window.startMatch=startMatch;
function mcell(text,side){const m=match;const cls="mcell"+(m.matched.has(text)?" gone":"")+(m.sel===text?" sel":"")+(m.bad===text?" bad":"")+(m.hit===text?" hit":"");return `<div class="${cls}" onclick="matchTap('${esc(text)}','${side}')">${text}</div>`;}
function renderMatch(){
  const done=match.matched.size,total=match.pairs.length*2;
  screen.innerHTML=`<div class="center"><div class="fade">
    <div class="q-head"><div class="glass q-back" onclick="match=null;view='today';render();">←</div><div class="q-prog"><i style="width:${Math.round(100*done/total)}%"></i></div><div class="q-x">🃏 ${match.hits}/${match.pairs.length}</div></div>
    <div class="glass prompt" style="padding:18px;"><div class="small">Tap a French word, then its meaning</div><div style="font-size:20px;font-weight:800;">Word Match</div></div>
    <div class="glass card"><div class="matchgrid"><div class="mcol">${match.left.map(t=>mcell(t,"L")).join("")}</div><div class="mcol">${match.right.map(t=>mcell(t,"R")).join("")}</div></div></div>
  </div></div>`;renderTabs();
}
window.matchTap=(text,side)=>{const m=match;if(!m||m.matched.has(text))return;sfx("tap");
  if(side==="L"){m.sel=text;m.bad=null;renderMatch();return;}
  if(!m.sel)return;const de=m.sel;const ok=m.pairs.some(p=>p.de===de&&p.en===text);m.tries++;
  if(ok){m.matched.add(de);m.matched.add(text);m.hits++;m.combo++;m.hit=text;m.sel=null;sfx("ok");haptic(30);
    const w=VOCAB.find(v=>v.de===de);if(w){const id="v:"+de;grade({itemId:id,skill:"vocab",bucket:"Vocabulary · "+w.cat,a:de},true,de,(comboMult(m.combo)-1)*8);}
    if(m.combo>=3)showCombo("🔥 x"+comboMult(m.combo)+" combo");
    renderMatch();setTimeout(()=>{m.hit=null;},350);
    if(m.matched.size>=m.pairs.length*2)setTimeout(matchDone,420);
  }else{m.combo=0;m.bad=text;sfx("no");haptic([30,20,30]);renderMatch();setTimeout(()=>{m.bad=null;m.sel=null;renderMatch();},550);}
};
function matchDone(){
  const secs=Math.round((Date.now()-match.start)/1000);const acc=Math.round(100*match.hits/Math.max(1,match.tries));
  confetti();sfx("win");
  screen.innerHTML=`<div class="center"><div class="glass result pop"><div class="em">🃏</div><div class="score">${match.hits}/${match.pairs.length}</div>
    <h2>${acc}% accuracy</h2><p>Matched in ${secs}s · +${match.hits*8} XP · ${S.cefr}</p>
    <button class="btn" onclick="startMatch()">Play again</button>
    <button class="btn ghost" style="margin-top:12px;" onclick="match=null;view='today';render();">Done</button></div></div>`;
  renderTabs();match=null;
}

/* ===================== CURRICULUM / MAP ===================== */
const SKILL_ORDER={vocab:0,grammar:1,verbs:2,phrases:3};
function lessonTitle(b){const p=b.split(" · ");let t=p[1]||b;if(t==="phrases")t="Phrases";if(p[0]==="Verbs")t=t+" verbs";if(p[0]==="Grammar")t=t.replace(/\s*\(.*\)/,"");if(p[0]==="Vocabulary")t=t+" words";return t;}
const LESSONS=(function(){const out=[];const per=6;for(const lvl of LEVELS){const items=REG.filter(it=>it.lvl===lvl).map(it=>it.id);if(!items.length)continue;for(let k=0;k<64;k++){const ids=[];for(let j=0;j<per;j++)ids.push(items[(k*per+j)%items.length]);const uniq=[...new Set(ids)];const skill=REGMAP[uniq[0]].skill;out.push({id:lvl+"|L"+k,lvl,skill,items:uniq,title:"Lesson "+(k+1)});}}out.forEach((l,i)=>l.idx=i);return out;})();
const lvlLessons=lvl=>LESSONS.filter(l=>l.lvl===lvl);
function lsRec(L){return S.lessons[L.id]||{done:false,stars:0,best:0};}
function lsDone(L){return !!(S.lessons[L.id]&&S.lessons[L.id].done);}
function lsUnlocked(i){return i===0||lsDone(LESSONS[i-1]);}
function currentLessonIdx(){for(let i=0;i<LESSONS.length;i++){if(lsUnlocked(i)&&!lsDone(LESSONS[i]))return i;}return LESSONS.length-1;}
function startLesson(i){if(!lsUnlocked(i)){toast("🔒 Finish the previous lesson first");sfx("no");return;}const L=LESSONS[i];S.cefr=L.lvl;save();const q=shuffle(L.items.slice()).slice(0,Math.min(10,L.items.length));sess={queue:q,answered:0,correct:0,combo:0,maxCombo:0,relearn:new Set(),mode:"lesson",lessonIdx:i,log:[]};runSession();}
window.startLesson=startLesson;
function viewMap(){
  const cur=currentLessonIdx();const doneCount=LESSONS.filter(lsDone).length;
  let html=`<div class="fade"><div class="top"><div><div class="hi">Your learning path</div><div class="title">Map</div></div><div class="glass streak"><span class="fire">🔥</span>${S.streak}</div></div>
   <div class="glass card" style="display:flex;align-items:center;gap:14px;"><div style="font-size:34px;">🗺️</div><div style="flex:1;"><div style="font-weight:800;">${doneCount} / ${LESSONS.length} lessons complete</div><div class="bar" style="margin-top:8px;height:10px;"><i style="width:${Math.round(100*doneCount/LESSONS.length)}%;background:linear-gradient(90deg,var(--good),var(--accent));"></i></div></div></div>`;
  let lastLvl=null;
  LESSONS.forEach((L,i)=>{
    if(L.lvl!==lastLvl){lastLvl=L.lvl;const lv=lvlLessons(L.lvl);const dn=lv.filter(lsDone).length;html+=`<div class="map-lvl"><span>${L.lvl}${dn===lv.length?" 👑":""}</span><span>${dn}/${lv.length}</span></div>`;}
    const done=lsDone(L),unlocked=lsUnlocked(i),isCur=i===cur;const rec=lsRec(L);
    const side=i%2===0?"l":"r";
    const cls="node "+(done?"done":unlocked?"open":"lock")+(isCur?" cur":"");
    const stars=done?`<div class="stars">${"★".repeat(rec.stars)}${"☆".repeat(3-rec.stars)}</div>`:"";
    const ic=done?"✓":unlocked?SKILLS[L.skill].emoji:"🔒";
    const tap=unlocked?`onclick="startLesson(${i})"`:`onclick="toast('🔒 Locked — finish earlier lessons')"`;
    html+=`<div class="noderow ${side}">${isCur?`<span class="mapmascot">🐼</span>`:""}<div class="${cls}" ${tap}><div class="nic">${ic}</div>${stars}</div><div class="nlabel">${L.title}<span>${L.lvl} · ${SKILLS[L.skill].name}</span></div></div>`;
  });
  html+=`</div>`;return html;
}

/* ============================ ROUTER ============================ */
function render(){if(sess){runSession();return;}if(view==="today")screen.innerHTML=viewToday();else if(view==="learn")screen.innerHTML=viewLearn();else if(view==="practice")screen.innerHTML=viewPractice();else if(view==="insights")screen.innerHTML=viewInsights();else if(view==="map")screen.innerHTML=viewMap();renderTabs();}
render();
</script>
</body>
